services:
  product-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: product-service
    image: grpc-isc-product:latest
    container_name: grpc-isc-product
    ports:
      - "9001:9001"
    environment:
      GRPC_ADDR: ":9001"
    restart: unless-stopped

  shipping-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: shipping-service
    image: grpc-isc-shipping:latest
    container_name: grpc-isc-shipping
    ports:
      - "9002:9002"
    environment:
      GRPC_ADDR: ":9002"
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: order-service
    image: grpc-isc-order:latest
    container_name: grpc-isc-order
    ports:
      - "9003:9003"
    environment:
      GRPC_ADDR: ":9003"
      SHIPPING_ADDR: "shipping-service:9002"
      PRODUCT_ADDR: "product-service:9001"
    depends_on:
      - product-service
      - shipping-service
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway
    image: grpc-isc-gateway:latest
    container_name: grpc-isc-gateway
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      FRONTEND_DIR: "/frontend"
      PRODUCT_ADDR: "product-service:9001"
      ORDER_ADDR: "order-service:9003"
      SHIPPING_ADDR: "shipping-service:9002"
    depends_on:
      - product-service
      - order-service
      - shipping-service
    restart: unless-stopped
